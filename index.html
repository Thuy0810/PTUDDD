<!doctype html>
<html lang="vi">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Xu — Quản lý chi tiêu</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700;900&family=Roboto+Mono:wght@500&display=swap" rel="stylesheet" />
<style>
/* ═══════════ Bảng màu theo CONTEXT (xanh dương + cam, Android Material 3) ═══════════ */
:root{
  --app-bg:#F4F7FE;
  --card:#FFFFFF;

  --blue:#2563EB;
  --blue-700:#1D4ED8;
  --blue-900:#1E3A8A;
  --blue-100:#DBEAFE;
  --blue-50:#EFF4FF;
  --header-grad:linear-gradient(135deg,#1D4ED8 0%,#2563EB 52%,#1E3A8A 100%);

  --orange:#FB8C2E;
  --orange-700:#EA7317;
  --orange-50:#FFF1E3;

  --green:#4CAF50;
  --green-50:#E9F7EA;
  --red:#FF6B6B;
  --red-50:#FFECEC;

  --ink:#1F2937;
  --muted:#6B7280;
  --faint:#9AA3B2;
  --line:#EEF1F7;
  --line-2:#E4E9F4;

  --r-xl:24px;
  --r-lg:20px;
  --r-md:16px;
  --r-sm:12px;
  --r-full:999px;

  --sh-card:0 6px 20px -10px rgba(30,58,138,.20);
  --sh-soft:0 3px 12px -6px rgba(30,58,138,.18);
  --sh-blue:0 14px 30px -12px rgba(37,99,235,.55);
  --sh-fab:0 10px 22px -8px rgba(234,115,23,.6);
}

*{box-sizing:border-box;}
html,body{margin:0;padding:0;height:100%;}
body{font-family:"Roboto",system-ui,sans-serif;background:#dfe4ee;-webkit-font-smoothing:antialiased;
  display:flex;align-items:center;justify-content:center;min-height:100%;}

/* ───────── App device frame (no bezel — pure Android screen) ───────── */
#root{width:100%;height:100%;display:flex;align-items:center;justify-content:center;}
.device{position:relative;width:390px;height:844px;max-height:100vh;max-width:100vw;
  border-radius:28px;overflow:hidden;background:var(--app-bg);
  box-shadow:0 24px 70px -24px rgba(30,58,138,.55);}
@media (max-width:430px){
  body{background:var(--app-bg);}
  .device{width:100vw;height:100vh;height:100dvh;border-radius:0;box-shadow:none;max-height:none;}
}

/* ───────── Android screen (no bezel) ───────── */
.scr{position:relative;width:100%;height:100%;overflow:hidden;background:var(--app-bg);display:flex;flex-direction:column;}
.screen{flex:1;min-height:0;display:flex;flex-direction:column;position:relative;background:var(--app-bg);}

.statusbar{flex:0 0 auto;height:30px;z-index:30;display:flex;align-items:center;justify-content:space-between;
  padding:0 18px;pointer-events:none;font-weight:500;font-size:13.5px;letter-spacing:.1px;}
.statusbar .sb-icons{display:flex;align-items:center;gap:7px;}

.gesture{flex:0 0 auto;height:22px;display:flex;align-items:center;justify-content:center;background:var(--card);}
.gesture i{width:124px;height:4px;border-radius:99px;background:var(--ink);opacity:.4;}

/* ───────── Typography ───────── */
.display{font-weight:700;font-size:32px;line-height:1.1;letter-spacing:-.6px;color:var(--ink);margin:0;}
.headline{font-weight:700;font-size:24px;line-height:1.2;letter-spacing:-.3px;color:var(--ink);margin:0;}
.title-lg{font-weight:700;font-size:19px;line-height:1.3;letter-spacing:-.2px;color:var(--ink);margin:0;}
.title-md{font-weight:700;font-size:16px;line-height:1.35;color:var(--ink);margin:0;}
.title-sm{font-weight:700;font-size:14px;line-height:1.4;color:var(--ink);margin:0;}
.body-lg{font-weight:400;font-size:15px;line-height:1.5;color:var(--muted);margin:0;}
.body-md{font-weight:400;font-size:13px;line-height:1.45;color:var(--muted);margin:0;}
.label-lg{font-weight:500;font-size:14px;letter-spacing:.1px;}
.label-md{font-weight:500;font-size:12px;letter-spacing:.2px;}
.label-sm{font-weight:500;font-size:11px;letter-spacing:.3px;}
.num{font-variant-numeric:tabular-nums;letter-spacing:-.3px;}
.muted{color:var(--muted);}
.faint{color:var(--faint);}

/* ───────── Common bits ───────── */
.body-pad{padding:0 18px;}
.scroll{flex:1;min-height:0;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;}
.scroll::-webkit-scrollbar{width:0;height:0;}
.row{display:flex;align-items:center;}
.col{display:flex;flex-direction:column;}
.between{justify-content:space-between;}
.gap4{gap:4px;}.gap6{gap:6px;}.gap8{gap:8px;}.gap10{gap:10px;}.gap12{gap:12px;}.gap14{gap:14px;}

.card{background:var(--card);border-radius:var(--r-lg);box-shadow:var(--sh-card);}
.card.flat{box-shadow:var(--sh-soft);}

/* chips / pills */
.chip{display:inline-flex;align-items:center;gap:6px;padding:7px 12px;border-radius:var(--r-full);font-size:12.5px;font-weight:500;}
.pill-orange{background:var(--orange-50);color:var(--orange-700);}
.pill-blue{background:var(--blue-50);color:var(--blue-700);}

.ibadge{display:flex;align-items:center;justify-content:center;flex:0 0 auto;border-radius:var(--r-full);}
.divider{height:1px;background:var(--line);}

/* progress */
.prog{height:8px;border-radius:99px;background:var(--line-2);overflow:hidden;display:flex;}
.prog>i{display:block;height:100%;border-radius:99px;transition:width .3s;}

/* text field (Android filled) */
.field{background:var(--blue-50);border:1.5px solid transparent;border-radius:var(--r-md);
  padding:0 14px;height:54px;display:flex;align-items:center;gap:10px;transition:border-color .15s,background .15s;}
.field:focus-within{border-color:var(--blue);background:#fff;}
.field input{flex:1;border:none;background:none;outline:none;font-family:"Roboto";font-size:15px;color:var(--ink);min-width:0;}
.field input::placeholder{color:var(--faint);}
.field-lbl{font-weight:500;font-size:13px;color:var(--ink);margin:0 0 7px 2px;}

/* buttons */
.btn{border:none;cursor:pointer;font-family:"Roboto";font-weight:700;border-radius:var(--r-md);
  transition:box-shadow .2s,filter .15s,transform .08s;display:flex;align-items:center;justify-content:center;gap:8px;}
.btn:active{transform:scale(.985);}
.btn-blue{background:var(--blue);color:#fff;box-shadow:var(--sh-blue);}
.btn-blue:hover{filter:brightness(1.05);}
.btn-orange{background:var(--orange);color:#fff;box-shadow:var(--sh-fab);}
.btn-outline{background:#fff;color:var(--blue-700);border:1.5px solid var(--line-2);box-shadow:none;}
.btn-outline:hover{background:var(--blue-50);}
.btn-text{background:transparent;color:var(--blue);box-shadow:none;}
.btn-lg{height:54px;font-size:15.5px;width:100%;letter-spacing:.2px;}

/* icon button */
.iconbtn{width:40px;height:40px;border-radius:var(--r-full);display:flex;align-items:center;justify-content:center;
  border:none;cursor:pointer;background:transparent;color:var(--muted);transition:background .15s;}
.iconbtn:hover{background:rgba(31,41,55,.06);}
.iconbtn.glass{background:rgba(255,255,255,.18);color:#fff;}
.iconbtn.glass:hover{background:rgba(255,255,255,.28);}

/* ───────── Bottom nav (4 tab + center FAB) ───────── */
.nav{position:absolute;left:0;right:0;bottom:0;height:78px;z-index:20;background:var(--card);
  border-top:1px solid var(--line);display:flex;align-items:flex-start;padding:9px 6px 0;
  box-shadow:0 -6px 20px -14px rgba(30,58,138,.35);}
.nav-item{flex:1;display:flex;flex-direction:column;align-items:center;gap:4px;background:none;border:none;cursor:pointer;color:var(--faint);transition:color .15s;padding:0;min-width:0;}
.nav-item .lbl{font-weight:500;font-size:10px;letter-spacing:.1px;white-space:nowrap;}
.nav-item.on{color:var(--blue);}
.nav-item.on .lbl{font-weight:700;}
.nav-spacer{width:62px;flex:0 0 auto;}
.fab{position:absolute;top:-22px;left:50%;transform:translateX(-50%);width:60px;height:60px;border-radius:20px;
  border:none;cursor:pointer;background:linear-gradient(135deg,#FBA94E,#FB8C2E 55%,#EA7317);color:#fff;box-shadow:var(--sh-fab);
  display:flex;align-items:center;justify-content:center;transition:transform .14s;}
.fab:active{transform:translateX(-50%) scale(.93);}

.pad-nav{padding-bottom:90px;}

/* page entrance */
@keyframes slideUp{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:none;}}
.anim{animation:slideUp .42s cubic-bezier(.2,.7,.3,1) both;}

/* striped placeholder */
.ph{background:repeating-linear-gradient(135deg,var(--line-2) 0 9px,var(--blue-50) 9px 18px);
  display:flex;align-items:center;justify-content:center;font-family:"Roboto Mono",monospace;font-size:11px;letter-spacing:.4px;color:var(--muted);}

/* toast */
.toast{position:absolute;left:50%;bottom:104px;transform:translateX(-50%);z-index:40;
  background:var(--ink);color:#fff;font-size:13px;font-weight:500;padding:11px 16px;border-radius:var(--r-full);
  box-shadow:0 10px 30px -10px rgba(0,0,0,.5);white-space:nowrap;animation:slideUp .3s both;}
</style>
</head>

const ICON_PATHS = {

function Icon({ name, size = 22, color = 'currentColor', sw = 2, style }) {

  if (!d) return null;
  return (
    <svg width={size} height={size} viewBox="0 0 24 24" fill="none"
      stroke={color} strokeWidth={sw} strokeLinecap="round" strokeLinejoin="round"

<script type="text/babel">
const { Icon } = window;

// VND formatter: dấu chấm ngăn nghìn, ký hiệu "VND" SAU số, không thập phân.
// money(1500000) -> "1.500.000 VND" ; money(-250000) -> "-250.000 VND"
function money(n, { sign = false, unit = 'VND' } = {}) {
  const neg = n < 0;
  const digits = Math.abs(Math.round(n)).toString().replace(/\B(?=(\d{3})+(?!\d))/g, '.');
  const prefix = neg ? '-' : (sign ? '+' : '');
  return prefix + digits + (unit ? ' ' + unit : '');
}

// danh mục (icon tròn + màu nhấn + nền nhạt)
const CATS = {
  food:     { label: 'Ăn uống',    icon: 'coffee',    c: '#EA7317', bg: '#FFF1E3' },
  transport:{ label: 'Di chuyển',  icon: 'car',       c: '#2563EB', bg: '#DBEAFE' },
  shopping: { label: 'Mua sắm',    icon: 'bag',       c: '#7C3AED', bg: '#EEE7FE' },
  bills:    { label: 'Hóa đơn',    icon: 'bolt',      c: '#0891B2', bg: '#D8F3FA' },
  fun:      { label: 'Giải trí',   icon: 'film',      c: '#DB2777', bg: '#FCE7F3' },
  health:   { label: 'Sức khỏe',   icon: 'heart',     c: '#16A34A', bg: '#E9F7EA' },
  income:   { label: 'Lương / Thu',icon: 'briefcase', c: '#16A34A', bg: '#E9F7EA' },
  other:    { label: 'Khác',       icon: 'note',      c: '#6B7280', bg: '#EEF1F7' },
};

function IconBadge({ cat, size = 44, icon, c, bg, sw = 2 }) {
  const m = cat ? CATS[cat] : { icon, c, bg };
  return (
    <div className="ibadge" style={{ width: size, height: size, background: m.bg }}>
      <Icon name={m.icon} size={size * 0.48} color={m.c} sw={sw} />
    </div>
  );
}

function Progress({ value, color = 'var(--blue)', track, h = 8 }) {
  const v = Math.max(2, Math.min(100, value));
  return (
    <div className="prog" style={{ height: h, background: track }}>
      <i style={{ width: v + '%', background: color }} />
    </div>
  );
}

/* Android status bar — time left, signal/wifi/battery right */
function StatusBar({ light }) {
  const c = light ? '#fff' : 'var(--ink)';
  return (
    <div className="statusbar" style={{ color: c }}>
      <span className="num" style={{ fontWeight: 500 }}>9:41</span>
      <div className="sb-icons" style={{ color: c }}>
        <svg width="17" height="13" viewBox="0 0 17 13" fill="none" aria-hidden="true">
          <rect x="0" y="9" width="3" height="4" rx="1" fill={c} />
          <rect x="4.5" y="6" width="3" height="7" rx="1" fill={c} />
          <rect x="9" y="3" width="3" height="10" rx="1" fill={c} />
          <rect x="13.5" y="0" width="3" height="13" rx="1" fill={c} opacity=".45" />
        </svg>
        <svg width="16" height="13" viewBox="0 0 16 13" fill="none" aria-hidden="true">
          <path d="M8 11.6 1.2 4.4a9.6 9.6 0 0 1 13.6 0L8 11.6Z" fill={c} />
        </svg>
        <svg width="24" height="13" viewBox="0 0 24 13" fill="none" aria-hidden="true">
          <rect x="1" y="1" width="20" height="11" rx="3" stroke={c} strokeWidth="1.4" />
          <rect x="3" y="3" width="13" height="7" rx="1.5" fill={c} />
          <rect x="22" y="4.5" width="2" height="4" rx="1" fill={c} />
        </svg>
      </div>
    </div>
  );
}

/* Bezel-less Android screen */
function Phone({ children, light = false }) {
  return (
    <div className="scr">
      <StatusBar light={light} />
      {children}
      <div className="gesture"><i></i></div>
    </div>
  );
}

/* Bottom navigation: 4 tab + nút ＋ Thêm ở giữa (tối đa 5 mục)

<script type="text/babel">
const { Phone, Onboarding, Login, Home } = window;

// màn hình đã dựng; các tab/màn chưa dựng sẽ hiển thị toast "đang phát triển"
const SCREENS = { onboarding: Onboarding, login: Login, home: Home };
const LIGHT_STATUS = { onboarding: true, login: true, home: true }; // status bar trắng (header gradient xanh)
const PENDING_LABELS = {
  add: 'Thêm giao dịch', history: 'Giao dịch', report: 'Báo cáo',
  profile: 'Cá nhân', budget: 'Ngân sách',
};

function App() {
  const [screen, setScreen] = React.useState('onboarding');
  const [toast, setToast] = React.useState(null);

  React.useEffect(() => {
    if (!toast) return;
    const id = setTimeout(() => setToast(null), 1900);
    return () => clearTimeout(id);
  }, [toast]);

  const go = (id) => {
    if (SCREENS[id]) { setScreen(id); return; }
    const lbl = PENDING_LABELS[id] || id;
    setToast('“' + lbl + '” đang được phát triển');
  };

  const Screen = SCREENS[screen] || Home;
  return (
    <div className="device">
      <Phone light={!!LIGHT_STATUS[screen]}>
        <Screen go={go} />
      </Phone>
      {toast && <div className="toast">{toast}</div>}
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
